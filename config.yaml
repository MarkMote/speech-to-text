hotkeys:
  - device_name: "keyd virtual keyboard"
    key_code: "KEY_F13"
  - device_name: "keyd virtual keyboard"
    key_code: "KEY_F19"

model:
  backend: "faster-whisper"
  name: "small.en"
  device: "cuda"
  compute_type: "int8_float16"

audio:
  sample_rate: 16000
  channels: 1
  device_index: null  # PulseAudio default
  tail_buffer: 0.3    # seconds to keep recording after key release

indicator:
  enabled: true
  position: "top-right"
  size: 16
  colors:
    recording: "#ff4444"
    transcribing: "#ffaa00"

output:
  method: "paste"          # "paste" (xclip + smart ctrl+v/ctrl+shift+v) or "type" (xdotool type, can freeze terminals)
  restore_clipboard: true
